<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<title>Monkey Finance</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --bg:#f7f7f8; --card:#ffffff; --card2:#f0f0f2; --line:#e6e6ea;
  --tx:#0d0d0d; --mut:#8e8ea0; --soft:#6e6e80;
  --green:#10a37f; --red:#e5484d; --chip:#ececf1;
  --shadow:0 1px 2px rgba(0,0,0,.04), 0 4px 16px rgba(0,0,0,.03);
  --btn:#0d0d0d; --btntx:#ffffff;
}
[data-theme="dark"]{
  --bg:#0d0d10; --card:#17171c; --card2:#1f1f26; --line:#26262e;
  --tx:#ececf1; --mut:#8e8ea0; --soft:#a9a9b8;
  --green:#19c37d; --red:#ff6369; --chip:#26262e;
  --shadow:0 1px 2px rgba(0,0,0,.3);
  --btn:#ececf1; --btntx:#0d0d10;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{background:var(--bg);color:var(--tx);font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;min-height:100vh;transition:background .25s,color .25s}
.num{font-variant-numeric:tabular-nums}
/* ---------- lock ---------- */
#lock{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:99;padding:20px}
.lockbox{width:100%;max-width:360px;background:var(--card);border:1px solid var(--line);border-radius:24px;padding:40px 32px;text-align:center;box-shadow:var(--shadow)}
.lockbox .logo{font-size:40px;margin-bottom:14px}
.lockbox h2{font-size:19px;font-weight:600;margin-bottom:6px}
.lockbox p{font-size:13px;color:var(--mut);margin-bottom:24px}
.lockbox input{width:100%;padding:13px 16px;border-radius:14px;border:1px solid var(--line);background:var(--bg);color:var(--tx);font-size:16px;text-align:center;margin-bottom:12px;font-family:inherit;outline:none;transition:border .2s}
.lockbox input:focus{border-color:var(--soft)}
.lockbox button{width:100%;padding:13px;border-radius:14px;border:none;background:var(--btn);color:var(--btntx);font-size:15px;font-weight:600;cursor:pointer;font-family:inherit}
#lockerr{color:var(--red);font-size:13px;margin-top:12px;min-height:16px}
/* ---------- shell ---------- */
#app{display:none;max-width:1024px;margin:0 auto;padding:20px 16px 80px}
header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;gap:10px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:10px;font-size:17px;font-weight:700}
.brand .logo{font-size:24px}
.hright{display:flex;align-items:center;gap:8px}
.seg{display:flex;background:var(--chip);border-radius:12px;padding:3px}
.seg button{border:none;background:transparent;color:var(--mut);padding:7px 14px;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s}
.seg button.on{background:var(--card);color:var(--tx);box-shadow:var(--shadow)}
.iconbtn{width:36px;height:36px;border-radius:12px;border:1px solid var(--line);background:var(--card);color:var(--tx);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.tabs{display:flex;gap:6px;margin-bottom:20px}
.tabs button{border:none;background:transparent;color:var(--mut);padding:9px 16px;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
.tabs button.on{background:var(--chip);color:var(--tx)}
/* ---------- grid & cards ---------- */
.grid{display:grid;grid-template-columns:1fr;gap:14px}
@media(min-width:760px){.grid{grid-template-columns:1fr 1fr}.span2{grid-column:span 2}}
.card{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:20px;box-shadow:var(--shadow)}
.card h3{font-size:13px;font-weight:600;color:var(--mut);margin-bottom:14px;letter-spacing:.01em}
.bignum{font-size:30px;font-weight:700;letter-spacing:-.02em;line-height:1.15}
.delta{display:inline-flex;align-items:center;gap:4px;font-size:13px;font-weight:600;border-radius:999px;padding:3px 10px;margin-top:8px}
.delta.up{color:var(--red);background:color-mix(in srgb, var(--red) 12%, transparent)}
.delta.down{color:var(--green);background:color-mix(in srgb, var(--green) 12%, transparent)}
.sub{font-size:12px;color:var(--mut);margin-top:6px}
.krow{display:flex;gap:24px;flex-wrap:wrap;margin-top:16px}
.kmini .l{font-size:12px;color:var(--mut);margin-bottom:3px}
.kmini .v{font-size:16px;font-weight:600}
.chartwrap{position:relative;width:100%;margin-top:6px}
/* ---------- category rows ---------- */
.crow{display:flex;align-items:center;gap:12px;padding:9px 0}
.crow .ic{width:38px;height:38px;border-radius:12px;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.crow .mid{flex:1;min-width:0}
.crow .nm{font-size:14px;font-weight:500;display:flex;justify-content:space-between;gap:8px}
.crow .nm .a{font-weight:600;white-space:nowrap}
.crow .bar{height:5px;border-radius:99px;background:var(--card2);margin-top:7px;overflow:hidden}
.crow .bar i{display:block;height:100%;border-radius:99px;background:var(--tx);opacity:.75}
.crow .pc{font-size:12px;color:var(--mut);width:38px;text-align:right;flex-shrink:0}
/* ---------- subscriptions ---------- */
.srow{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--line)}
.srow:last-child{border-bottom:none}
.srow .ic{width:34px;height:34px;border-radius:10px;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:15px}
.srow .mid{flex:1;min-width:0}
.srow .nm{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.srow .d{font-size:12px;color:var(--mut);margin-top:1px}
.srow .a{font-size:14px;font-weight:600;white-space:nowrap}
/* ---------- transactions ---------- */
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.filters>*{flex:1;min-width:120px}
select,input.search{background:var(--card);color:var(--tx);border:1px solid var(--line);border-radius:12px;padding:10px 12px;font-size:14px;font-family:inherit;outline:none;appearance:none}
.lsum{font-size:13px;color:var(--mut);margin-bottom:12px;padding:0 4px}
.txn{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--line)}
.txn:last-child{border-bottom:none}
.txn .ic{width:38px;height:38px;border-radius:12px;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.txn .mid{flex:1;min-width:0}
.txn .m{font-size:14px;font-weight:500;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical}
.txn .d{font-size:12px;color:var(--mut);margin-top:2px}
.txn .a{font-size:14px;font-weight:600;white-space:nowrap;text-align:right}
.a.chi{color:var(--tx)}.a.thu{color:var(--green)}.a.nb{color:var(--mut);font-weight:500}
#more{width:100%;padding:12px;border-radius:14px;border:1px solid var(--line);background:var(--card);color:var(--tx);font-size:14px;font-weight:500;cursor:pointer;margin-top:14px;font-family:inherit}
.link{background:none;border:none;color:var(--mut);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;padding:0}
footer{text-align:center;color:var(--mut);font-size:12px;margin-top:28px}
</style>
</head>
<body>
<div id="lock"><div class="lockbox">
<div class="logo">🐒</div>
<h2>Monkey Finance</h2>
<p>Dữ liệu được mã hóa đầu cuối</p>
<input id="pw" type="password" placeholder="Nhập mật khẩu" autocomplete="current-password">
<button onclick="unlock()">Mở khóa</button>
<div id="lockerr"></div>
</div></div>

<div id="app">
<header>
<div class="brand"><span class="logo">🐒</span> Monkey Finance</div>
<div class="hright">
<div class="seg" id="yearSeg"></div>
<button class="iconbtn" id="themeBtn" onclick="toggleTheme()" title="Đổi giao diện">◐</button>
</div>
</header>
<div class="tabs">
<button class="on" data-t="overview" onclick="showTab('overview')">Tổng quan</button>
<button data-t="txns" onclick="showTab('txns')">Giao dịch</button>
</div>

<div id="overview" class="grid">
  <div class="card" id="heroCard">
    <h3 id="heroLbl">Chi tiêu tháng này</h3>
    <div class="bignum num" id="heroVal"></div>
    <span class="delta" id="heroDelta"></span>
    <div class="chartwrap"><canvas id="cCum" height="150"></canvas></div>
    <div class="sub" id="heroSub"></div>
  </div>
  <div class="card">
    <h3>Tổng quan <span id="ovYear"></span></h3>
    <div class="krow" style="margin-top:4px">
      <div class="kmini"><div class="l">Thu nhập</div><div class="v num" style="color:var(--green)" id="kThu"></div></div>
      <div class="kmini"><div class="l">Chi tiêu</div><div class="v num" id="kChi"></div></div>
      <div class="kmini"><div class="l">Chênh lệch</div><div class="v num" id="kNet"></div></div>
    </div>
    <div class="chartwrap"><canvas id="cMonth" height="170"></canvas></div>
  </div>
  <div class="card">
    <h3>Chi theo danh mục</h3>
    <div id="catList"></div>
  </div>
  <div class="card">
    <h3>Định kỳ / Subscriptions</h3>
    <div id="subList"></div>
  </div>
  <div class="card span2">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
      <h3 style="margin:0">Giao dịch gần đây</h3>
      <button class="link" onclick="showTab('txns')">Xem tất cả →</button>
    </div>
    <div id="recentList"></div>
  </div>
</div>

<div id="txns" style="display:none">
<div class="filters">
<input class="search" id="q" placeholder="Tìm kiếm..." oninput="renderList(true)">
<select id="fMonth" onchange="renderList(true)"></select>
<select id="fCat" onchange="renderList(true)"></select>
<select id="fType" onchange="renderList(true)">
<option value="">Loại: tất cả</option><option>Chi tiêu</option><option>Thu nhập</option><option>Nội bộ</option>
</select>
</div>
<div class="lsum num" id="listSum"></div>
<div class="card"><div id="list"></div><button id="more" onclick="page++;renderList()">Xem thêm</button></div>
</div>

<footer id="foot"></footer>
</div>

let DATA=null, page=0; const PAGE=50;
let charts={};
const ICONS={'Ăn uống':'🍜','Di chuyển':'🛵','Tiền Nhà':'🏠','Mua sắm':'🛍️','Giải trí':'🎮','Du lịch':'✈️','Hóa đơn':'🧾','Tiện ích':'📱','Chăm sóc cá nhân':'💆','Thú cưng':'🐾','Đầu tư':'📈','Trả Lương':'💼','Đóng Họ':'🤝','Thuế':'🏛️','Phí':'💳','Bảo hiểm':'🛡️','Quà cáp':'🎁','Khác':'📦','Tiền Lương':'💰','Tiền Dự Án':'🧑‍💻','Tiền Thưởng':'🏆','Được Tặng':'🎀','Bán Đồ':'🏷️','Thu nhập khác':'✨','Nội bộ':'🔄'};
const ic = c => ICONS[c]||'📦';
const fmt = n => n.toLocaleString('vi-VN')+'đ';
const fmtS = n => Math.abs(n)>=1e9 ? (n/1e9).toLocaleString('vi-VN',{maximumFractionDigits:2})+' tỷ' : Math.abs(n)>=1e6 ? (n/1e6).toLocaleString('vi-VN',{maximumFractionDigits:1})+' tr' : (n/1e3).toLocaleString('vi-VN',{maximumFractionDigits:0})+'k';
const b64 = s => Uint8Array.from(atob(s), c=>c.charCodeAt(0));
const cssv = n => getComputedStyle(document.documentElement).getPropertyValue(n).trim();

/* ---------- theme ---------- */
function applyTheme(t){
  document.documentElement.dataset.theme = t==='auto' ? (matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light') : t;
  localStorage.setItem('mf-theme', t);
  if(DATA) renderAll();
}
function toggleTheme(){
  const cur = document.documentElement.dataset.theme;
  applyTheme(cur==='dark'?'light':'dark');
}
applyTheme(localStorage.getItem('mf-theme')||'auto');
matchMedia('(prefers-color-scheme: dark)').addEventListener('change',()=>{ if((localStorage.getItem('mf-theme')||'auto')==='auto') applyTheme('auto'); });

/* ---------- crypto ---------- */
async function unlock(){
  const pw = document.getElementById('pw').value;
  const err = document.getElementById('lockerr');
  err.textContent = 'Đang giải mã...';
  try{
    const enc = new TextEncoder();
    const km = await crypto.subtle.importKey('raw', enc.encode(pw), 'PBKDF2', false, ['deriveKey']);
    const key = await crypto.subtle.deriveKey({name:'PBKDF2', salt:b64(PAYLOAD.salt), iterations:PAYLOAD.iter, hash:'SHA-256'}, km, {name:'AES-GCM', length:256}, false, ['decrypt']);
    const pt = await crypto.subtle.decrypt({name:'AES-GCM', iv:b64(PAYLOAD.iv)}, key, b64(PAYLOAD.ct));
    DATA = JSON.parse(new TextDecoder().decode(pt));
    document.getElementById('lock').style.display='none';
    document.getElementById('app').style.display='block';
    init();
  }catch(e){ err.textContent = 'Sai mật khẩu, thử lại nhé.'; }
}
document.getElementById('pw').addEventListener('keydown', e=>{ if(e.key==='Enter') unlock(); });

function showTab(t){
  document.querySelectorAll('.tabs button').forEach(x=>x.classList.toggle('on', x.dataset.t===t));
  document.getElementById('overview').style.display = t==='overview'?'grid':'none';
  document.getElementById('txns').style.display = t==='txns'?'block':'none';
  window.scrollTo({top:0});
}

let curYear='';
function init(){
  const years = [...new Set(DATA.tx.map(t=>t.d.slice(0,4)))].sort().reverse();
  curYear = years[0];
  const seg = document.getElementById('yearSeg');
  seg.innerHTML = years.map(y=>`<button data-y="${y}">${y}</button>`).join('') + '<button data-y="all">Tất cả</button>';
  seg.querySelectorAll('button').forEach(b=>b.onclick=()=>{ curYear=b.dataset.y; renderAll(); });
  const months = [...new Set(DATA.tx.map(t=>t.d.slice(0,7)))].sort().reverse();
  document.getElementById('fMonth').innerHTML = '<option value="">Tháng: tất cả</option>' + months.map(m=>`<option>${m}</option>`).join('');
  const cats = [...new Set(DATA.tx.map(t=>t.c))].sort();
  document.getElementById('fCat').innerHTML = '<option value="">Danh mục: tất cả</option>' + cats.map(c=>`<option>${c}</option>`).join('');
  document.getElementById('foot').textContent = `Cập nhật ${DATA.updated} · ${DATA.tx.length.toLocaleString('vi-VN')} giao dịch · mã hóa AES-256`;
  renderAll();
}

const sel = () => curYear==='all' ? DATA.tx : DATA.tx.filter(t=>t.d.startsWith(curYear));

function destroyCharts(){ Object.values(charts).forEach(c=>c&&c.destroy()); charts={}; }

function renderAll(){
  if(!DATA) return;
  document.querySelectorAll('#yearSeg button').forEach(b=>b.classList.toggle('on', b.dataset.y===curYear));
  destroyCharts();
  const MUT=cssv('--mut'), LINE=cssv('--line'), TX=cssv('--tx'), GREEN=cssv('--green'), RED=cssv('--red');
  Chart.defaults.font.family = "'Inter',sans-serif";
  const txs = sel().filter(t=>t.l!=='Nội bộ');

  /* KPIs */
  const thu = txs.filter(t=>t.l==='Thu nhập').reduce((s,t)=>s+t.a,0);
  const chi = txs.filter(t=>t.l==='Chi tiêu').reduce((s,t)=>s+t.a,0);
  document.getElementById('ovYear').textContent = curYear==='all'?'toàn bộ':curYear;
  document.getElementById('kThu').textContent = fmt(thu);
  document.getElementById('kChi').textContent = fmt(chi);
  const net=thu-chi, kn=document.getElementById('kNet');
  kn.textContent=(net>=0?'+':'')+fmt(net); kn.style.color = net>=0?GREEN:RED;

  /* hero: current month cumulative vs prev month */
  const all = DATA.tx.filter(t=>t.l==='Chi tiêu');
  const curMo = [...new Set(all.map(t=>t.d.slice(0,7)))].sort().pop();
  const [cy,cm] = curMo.split('-').map(Number);
  const prevMo = cm===1 ? `${cy-1}-12` : `${cy}-${String(cm-1).padStart(2,'0')}`;
  const dim = m => new Date(m.split('-')[0], m.split('-')[1], 0).getDate();
  const daily = m => { const a=Array(dim(m)).fill(0); all.filter(t=>t.d.startsWith(m)).forEach(t=>{a[+t.d.slice(8)-1]+=t.a}); let s=0; return a.map(v=>s+=v); };
  const curC = daily(curMo), prevC = daily(prevMo);
  const lastDay = Math.max(...all.filter(t=>t.d.startsWith(curMo)).map(t=>+t.d.slice(8)), 1);
  const curTot = curC[lastDay-1]||0, prevSame = prevC[Math.min(lastDay,prevC.length)-1]||0;
  document.getElementById('heroLbl').textContent = `Chi tiêu tháng ${cm}/${cy}`;
  document.getElementById('heroVal').textContent = fmt(curTot);
  const dEl = document.getElementById('heroDelta');
  if(prevSame>0){
    const pct = Math.round((curTot-prevSame)/prevSame*100);
    dEl.className = 'delta ' + (pct>=0?'up':'down');
    dEl.textContent = `${pct>=0?'↑':'↓'} ${Math.abs(pct)}% so với cùng kỳ tháng trước`;
  } else dEl.style.display='none';
  document.getElementById('heroSub').textContent = `Tháng ${prevMo.slice(5)} cả tháng: ${fmt(prevC[prevC.length-1]||0)}`;
  const gctx = document.getElementById('cCum').getContext('2d');
  const grad = gctx.createLinearGradient(0,0,0,150);
  grad.addColorStop(0, TX+'26'); grad.addColorStop(1, TX+'00');
  charts.cum = new Chart(gctx, {type:'line',
    data:{labels:curC.map((_,i)=>i+1), datasets:[
      {label:`Tháng ${cm}`, data:curC.slice(0,lastDay), borderColor:TX, backgroundColor:grad, fill:true, borderWidth:2, pointRadius:0, tension:.35},
      {label:`Tháng ${prevMo.slice(5)}`, data:prevC, borderColor:MUT, borderDash:[4,4], borderWidth:1.5, pointRadius:0, tension:.35, fill:false}]},
    options:{responsive:true, interaction:{mode:'index',intersect:false},
      plugins:{legend:{display:false}, tooltip:{callbacks:{title:i=>'Ngày '+i[0].label, label:c=>c.dataset.label+': '+fmt(c.raw)}}},
      scales:{x:{ticks:{color:MUT,maxTicksLimit:7,font:{size:11}},grid:{display:false}}, y:{ticks:{color:MUT,callback:v=>fmtS(v),maxTicksLimit:5,font:{size:11}},grid:{color:LINE},border:{display:false}}}}});

  /* month bar */
  const moKeys = [...new Set(txs.map(t=>t.d.slice(0,7)))].sort();
  charts.month = new Chart(document.getElementById('cMonth'), {type:'bar',
    data:{labels:moKeys.map(m=>'T'+ +m.slice(5)), datasets:[
      {label:'Thu', data:moKeys.map(m=>txs.filter(t=>t.l==='Thu nhập'&&t.d.startsWith(m)).reduce((s,t)=>s+t.a,0)), backgroundColor:GREEN, borderRadius:6, maxBarThickness:14},
      {label:'Chi', data:moKeys.map(m=>txs.filter(t=>t.l==='Chi tiêu'&&t.d.startsWith(m)).reduce((s,t)=>s+t.a,0)), backgroundColor:cssv('--chip'), borderColor:MUT, borderRadius:6, maxBarThickness:14}]},
    options:{responsive:true,
      plugins:{legend:{labels:{color:MUT,boxWidth:10,boxHeight:10,borderRadius:5,useBorderRadius:true,font:{size:12}}}, tooltip:{callbacks:{label:c=>c.dataset.label+': '+fmt(c.raw)}}},
      scales:{x:{ticks:{color:MUT,font:{size:11}},grid:{display:false}}, y:{ticks:{color:MUT,callback:v=>fmtS(v),maxTicksLimit:5,font:{size:11}},grid:{color:LINE},border:{display:false}}}}});

  /* categories */
  const cats={};
  txs.filter(t=>t.l==='Chi tiêu').forEach(t=>{cats[t.c]=(cats[t.c]||0)+t.a});
  const ck = Object.keys(cats).sort((a,b)=>cats[b]-cats[a]);
  const mx = cats[ck[0]]||1;
  document.getElementById('catList').innerHTML = ck.slice(0,9).map(c=>`
    <div class="crow"><div class="ic">${ic(c)}</div>
    <div class="mid"><div class="nm"><span>${c}</span><span class="a num">${fmt(cats[c])}</span></div>
    <div class="bar"><i style="width:${Math.max(2,cats[c]/mx*100)}%"></i></div></div>
    <div class="pc num">${Math.round(cats[c]/chi*100)}%</div></div>`).join('');

  /* subscriptions: Tiện ích merchants grouped */
  const subs={};
  sel().filter(t=>t.l==='Chi tiêu'&&t.c==='Tiện ích').forEach(t=>{
    let k = t.m.split(/[\s\-\(\[]/).slice(0,2).join(' ').replace(/[*_.,]/g,'').trim().toUpperCase() || t.m;
    (subs[k]=subs[k]||{n:0,tot:0,last:'',name:t.m}).n++; subs[k].tot+=t.a;
    if(t.d>subs[k].last){subs[k].last=t.d; subs[k].name=t.m;}
  });
  const sk = Object.keys(subs).sort((a,b)=>subs[b].tot-subs[a].tot).slice(0,7);
  document.getElementById('subList').innerHTML = sk.length ? sk.map(k=>{const s=subs[k];return `
    <div class="srow"><div class="ic">📱</div>
    <div class="mid"><div class="nm">${s.name.split('(')[0].slice(0,42)}</div>
    <div class="d">${s.n} lần · gần nhất ${s.last.split('-').reverse().join('/')}</div></div>
    <div class="a num">${fmt(Math.round(s.tot/s.n))}<span style="color:var(--mut);font-weight:400;font-size:12px">/lần</span></div></div>`}).join('')
    : '<div class="sub">Chưa có khoản định kỳ</div>';

  /* recent */
  const rec = [...sel()].sort((a,b)=>(b.d+(b.t||'')).localeCompare(a.d+(a.t||''))).filter(t=>t.l!=='Nội bộ').slice(0,6);
  document.getElementById('recentList').innerHTML = rec.map(txnRow).join('');
  renderList(true);
}

function txnRow(t){
  const cls = t.l==='Chi tiêu'?'chi':(t.l==='Thu nhập'?'thu':'nb');
  const sign = t.l==='Chi tiêu'?'−':(t.l==='Thu nhập'?'+':'');
  return `<div class="txn"><div class="ic">${ic(t.c)}</div>
  <div class="mid"><div class="m">${t.m.replace(/</g,'&lt;')}</div>
  <div class="d">${t.c} · ${t.d.split('-').reverse().join('/')}${t.t?' '+t.t:''} · ${t.b}</div></div>
  <div class="a num ${cls}">${sign}${fmt(t.a)}</div></div>`;
}

function renderList(reset){
  if(reset) page=0;
  const q = document.getElementById('q').value.toLowerCase();
  const fm = document.getElementById('fMonth').value;
  const fc = document.getElementById('fCat').value;
  const ft = document.getElementById('fType').value;
  let txs = sel();
  txs = ft ? txs.filter(t=>t.l===ft) : txs.filter(t=>t.l!=='Nội bộ');
  if(fm) txs = txs.filter(t=>t.d.startsWith(fm));
  if(fc) txs = txs.filter(t=>t.c===fc);
  if(q) txs = txs.filter(t=>(t.m+' '+t.c+' '+t.b).toLowerCase().includes(q));
  txs.sort((a,b)=>(b.d+(b.t||'')).localeCompare(a.d+(a.t||'')));
  document.getElementById('listSum').textContent = `${txs.length.toLocaleString('vi-VN')} giao dịch · tổng ${fmt(txs.reduce((s,t)=>s+t.a,0))}`;
  const show = txs.slice(0,(page+1)*PAGE);
  document.getElementById('list').innerHTML = show.map(txnRow).join('') || '<div class="sub" style="padding:10px 0">Không có giao dịch nào</div>';
  document.getElementById('more').style.display = show.length<txs.length?'block':'none';
}
</script>
</body>
</html>
