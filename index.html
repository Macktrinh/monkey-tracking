<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<title>🐒 Monkey Tracking</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{--bg:#0f1115;--card:#181b22;--card2:#1f232d;--tx:#e8eaf0;--mut:#8b93a7;--green:#34d399;--red:#f87171;--accent:#818cf8;--line:#262b36}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--tx);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;min-height:100vh}
#lock{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:99}
.lockbox{text-align:center;padding:32px;max-width:340px;width:100%}
.lockbox h1{font-size:44px;margin-bottom:8px}
.lockbox h2{font-size:20px;margin-bottom:24px;font-weight:600}
.lockbox input{width:100%;padding:14px;border-radius:12px;border:1px solid var(--line);background:var(--card);color:var(--tx);font-size:16px;text-align:center;margin-bottom:12px}
.lockbox button{width:100%;padding:14px;border-radius:12px;border:none;background:var(--accent);color:#fff;font-size:16px;font-weight:600;cursor:pointer}
#lockerr{color:var(--red);font-size:14px;margin-top:10px;min-height:18px}
#app{display:none;max-width:860px;margin:0 auto;padding:16px 14px 60px}
header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px}
header h1{font-size:20px}
select,input.search{background:var(--card);color:var(--tx);border:1px solid var(--line);border-radius:10px;padding:8px 10px;font-size:14px}
.tabs{display:flex;gap:8px;margin-bottom:14px}
.tab{flex:1;text-align:center;padding:10px;border-radius:12px;background:var(--card);cursor:pointer;font-size:14px;font-weight:600;color:var(--mut)}
.tab.active{background:var(--accent);color:#fff}
.kpis{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px}
.kpi{background:var(--card);border-radius:14px;padding:14px}
.kpi .lbl{font-size:12px;color:var(--mut);margin-bottom:4px}
.kpi .val{font-size:17px;font-weight:700}
.card{background:var(--card);border-radius:14px;padding:14px;margin-bottom:14px}
.card h3{font-size:14px;color:var(--mut);margin-bottom:10px;font-weight:600}
.chartwrap{position:relative;width:100%}
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.filters>*{flex:1;min-width:110px}
.txn{display:flex;justify-content:space-between;gap:10px;padding:10px 2px;border-bottom:1px solid var(--line);font-size:14px}
.txn:last-child{border-bottom:none}
.txn .desc{flex:1;min-width:0}
.txn .desc .m{overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.txn .desc .sub{font-size:12px;color:var(--mut);margin-top:2px}
.txn .amt{text-align:right;white-space:nowrap;font-weight:600}
.amt.chi{color:var(--red)}.amt.thu{color:var(--green)}.amt.nb{color:var(--mut)}
.badge{display:inline-block;font-size:11px;background:var(--card2);color:var(--mut);border-radius:6px;padding:1px 6px;margin-right:4px}
#more{width:100%;padding:12px;border-radius:12px;border:1px solid var(--line);background:var(--card);color:var(--tx);font-size:14px;cursor:pointer;margin-top:10px}
footer{text-align:center;color:var(--mut);font-size:12px;margin-top:20px}
@media(min-width:640px){.kpis{grid-template-columns:repeat(4,1fr)}.kpi .val{font-size:19px}}
</style>
</head>
<body>
<div id="lock"><div class="lockbox">
<h1>🐒</h1><h2>Monkey Tracking</h2>
<input id="pw" type="password" placeholder="Mật khẩu" autocomplete="current-password">
<button onclick="unlock()">Mở khóa</button>
<div id="lockerr"></div>
</div></div>

<div id="app">
<header>
<h1>🐒 Monkey Tracking</h1>
<select id="year"></select>
</header>
<div class="tabs">
<div class="tab active" data-t="overview" onclick="showTab('overview')">Tổng quan</div>
<div class="tab" data-t="txns" onclick="showTab('txns')">Giao dịch</div>
</div>

<div id="overview">
<div class="kpis">
<div class="kpi"><div class="lbl">Thu nhập</div><div class="val" style="color:var(--green)" id="kThu"></div></div>
<div class="kpi"><div class="lbl">Chi tiêu</div><div class="val" style="color:var(--red)" id="kChi"></div></div>
<div class="kpi"><div class="lbl">Chênh lệch</div><div class="val" id="kNet"></div></div>
<div class="kpi"><div class="lbl" id="kMoLbl">Chi tháng này</div><div class="val" id="kMo"></div></div>
</div>
<div class="card"><h3>Thu / Chi theo tháng</h3><div class="chartwrap"><canvas id="cMonth" height="220"></canvas></div></div>
<div class="card"><h3>Chi tiêu theo nhóm</h3><div class="chartwrap"><canvas id="cGroup" height="220"></canvas></div></div>
<div class="card"><h3>Top danh mục chi</h3><div class="chartwrap"><canvas id="cCat" height="260"></canvas></div></div>
</div>

<div id="txns" style="display:none">
<div class="filters">
<input class="search" id="q" placeholder="Tìm kiếm..." oninput="renderList(true)">
<select id="fMonth" onchange="renderList(true)"></select>
<select id="fCat" onchange="renderList(true)"></select>
<select id="fType" onchange="renderList(true)">
<option value="">Loại: tất cả</option><option>Chi tiêu</option><option>Thu nhập</option><option>Nội bộ</option>
</select>
</div>
<div class="card" id="listSum" style="font-size:13px;color:var(--mut)"></div>
<div class="card"><div id="list"></div><button id="more" onclick="page++;renderList()">Xem thêm</button></div>
</div>

<footer id="foot"></footer>
</div>

let DATA=null, page=0; const PAGE=50;
let chM=null,chG=null,chC=null;
const fmt = n => n.toLocaleString('vi-VN') + 'đ';
const fmtS = n => Math.abs(n)>=1e9 ? (n/1e9).toLocaleString('vi-VN',{maximumFractionDigits:2})+' tỷ' : (n/1e6).toLocaleString('vi-VN',{maximumFractionDigits:1})+' tr';
const b64 = s => Uint8Array.from(atob(s), c=>c.charCodeAt(0));

async function unlock(){
  const pw = document.getElementById('pw').value;
  const err = document.getElementById('lockerr');
  err.textContent = 'Đang giải mã...';
  try{
    const enc = new TextEncoder();
    const km = await crypto.subtle.importKey('raw', enc.encode(pw), 'PBKDF2', false, ['deriveKey']);
    const key = await crypto.subtle.deriveKey({name:'PBKDF2', salt:b64(PAYLOAD.salt), iterations:PAYLOAD.iter, hash:'SHA-256'}, km, {name:'AES-GCM', length:256}, false, ['decrypt']);
    const pt = await crypto.subtle.decrypt({name:'AES-GCM', iv:b64(PAYLOAD.iv)}, key, b64(PAYLOAD.ct));
    DATA = JSON.parse(new TextDecoder().decode(pt));
    document.getElementById('lock').style.display='none';
    document.getElementById('app').style.display='block';
    init();
  }catch(e){ err.textContent = 'Sai mật khẩu, thử lại nhé.'; }
}
document.getElementById('pw').addEventListener('keydown', e=>{ if(e.key==='Enter') unlock(); });

function showTab(t){
  document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('active', x.dataset.t===t));
  document.getElementById('overview').style.display = t==='overview'?'block':'none';
  document.getElementById('txns').style.display = t==='txns'?'block':'none';
}

function init(){
  const years = [...new Set(DATA.tx.map(t=>t.d.slice(0,4)))].sort().reverse();
  const ySel = document.getElementById('year');
  ySel.innerHTML = years.map(y=>`<option>${y}</option>`).join('') + '<option value="all">Tất cả</option>';
  ySel.onchange = renderAll;
  const months = [...new Set(DATA.tx.map(t=>t.d.slice(0,7)))].sort().reverse();
  document.getElementById('fMonth').innerHTML = '<option value="">Tháng: tất cả</option>' + months.map(m=>`<option>${m}</option>`).join('');
  const cats = [...new Set(DATA.tx.map(t=>t.c))].sort();
  document.getElementById('fCat').innerHTML = '<option value="">Danh mục: tất cả</option>' + cats.map(c=>`<option>${c}</option>`).join('');
  document.getElementById('foot').textContent = `Cập nhật: ${DATA.updated} · ${DATA.tx.length} giao dịch`;
  renderAll();
}

function sel(){ const y = document.getElementById('year').value; return y==='all' ? DATA.tx : DATA.tx.filter(t=>t.d.startsWith(y)); }

function renderAll(){
  const txs = sel().filter(t=>t.l!=='Nội bộ');
  const thu = txs.filter(t=>t.l==='Thu nhập').reduce((s,t)=>s+t.a,0);
  const chi = txs.filter(t=>t.l==='Chi tiêu').reduce((s,t)=>s+t.a,0);
  document.getElementById('kThu').textContent = fmt(thu);
  document.getElementById('kChi').textContent = fmt(chi);
  const net = thu-chi;
  const kn = document.getElementById('kNet');
  kn.textContent = (net>=0?'+':'') + fmt(net);
  kn.style.color = net>=0 ? 'var(--green)' : 'var(--red)';
  const nowMo = DATA.updated.slice(6,10)+'-'+DATA.updated.slice(3,5);
  const lastMo = [...new Set(txs.map(t=>t.d.slice(0,7)))].sort().pop();
  const mo = txs.some(t=>t.d.startsWith(nowMo)) ? nowMo : lastMo;
  document.getElementById('kMoLbl').textContent = 'Chi tháng ' + (mo?mo.slice(5):'--');
  document.getElementById('kMo').textContent = fmt(txs.filter(t=>t.l==='Chi tiêu'&&t.d.startsWith(mo||'x')).reduce((s,t)=>s+t.a,0));

  // month chart
  const moKeys = [...new Set(txs.map(t=>t.d.slice(0,7)))].sort();
  const thuM = moKeys.map(m=>txs.filter(t=>t.l==='Thu nhập'&&t.d.startsWith(m)).reduce((s,t)=>s+t.a,0));
  const chiM = moKeys.map(m=>txs.filter(t=>t.l==='Chi tiêu'&&t.d.startsWith(m)).reduce((s,t)=>s+t.a,0));
  if(chM) chM.destroy();
  chM = new Chart(document.getElementById('cMonth'), {type:'bar',
    data:{labels:moKeys.map(m=>m.slice(5)+'/'+m.slice(2,4)), datasets:[
      {label:'Thu', data:thuM, backgroundColor:'#34d399', borderRadius:4},
      {label:'Chi', data:chiM, backgroundColor:'#f87171', borderRadius:4}]},
    options:{responsive:true, plugins:{legend:{labels:{color:'#8b93a7'}}, tooltip:{callbacks:{label:c=>c.dataset.label+': '+fmt(c.raw)}}},
      scales:{x:{ticks:{color:'#8b93a7'},grid:{display:false}}, y:{ticks:{color:'#8b93a7',callback:v=>fmtS(v)},grid:{color:'#262b36'}}}}});

  // group chart
  const groups={};
  txs.filter(t=>t.l==='Chi tiêu').forEach(t=>{ groups[t.g]=(groups[t.g]||0)+t.a; });
  const gk = Object.keys(groups).sort((a,b)=>groups[b]-groups[a]);
  if(chG) chG.destroy();
  chG = new Chart(document.getElementById('cGroup'), {type:'doughnut',
    data:{labels:gk, datasets:[{data:gk.map(k=>groups[k]), backgroundColor:['#818cf8','#34d399','#fbbf24','#f87171','#38bdf8','#a78bfa'], borderWidth:0}]},
    options:{responsive:true, plugins:{legend:{position:'right',labels:{color:'#8b93a7',boxWidth:12}}, tooltip:{callbacks:{label:c=>c.label+': '+fmt(c.raw)}}}}});

  // top categories
  const cats={};
  txs.filter(t=>t.l==='Chi tiêu').forEach(t=>{ cats[t.c]=(cats[t.c]||0)+t.a; });
  const ck = Object.keys(cats).sort((a,b)=>cats[b]-cats[a]).slice(0,8);
  if(chC) chC.destroy();
  chC = new Chart(document.getElementById('cCat'), {type:'bar',
    data:{labels:ck, datasets:[{data:ck.map(k=>cats[k]), backgroundColor:'#818cf8', borderRadius:4}]},
    options:{indexAxis:'y', responsive:true, plugins:{legend:{display:false}, tooltip:{callbacks:{label:c=>fmt(c.raw)}}},
      scales:{x:{ticks:{color:'#8b93a7',callback:v=>fmtS(v)},grid:{color:'#262b36'}}, y:{ticks:{color:'#8b93a7'},grid:{display:false}}}}});
  renderList(true);
}

function renderList(reset){
  if(reset) page=0;
  const q = document.getElementById('q').value.toLowerCase();
  const fm = document.getElementById('fMonth').value;
  const fc = document.getElementById('fCat').value;
  const ft = document.getElementById('fType').value;
  let txs = sel();
  if(!ft) txs = txs.filter(t=>t.l!=='Nội bộ');
  else txs = txs.filter(t=>t.l===ft);
  if(fm) txs = txs.filter(t=>t.d.startsWith(fm));
  if(fc) txs = txs.filter(t=>t.c===fc);
  if(q) txs = txs.filter(t=>(t.m+' '+t.c+' '+t.b).toLowerCase().includes(q));
  txs.sort((a,b)=> (b.d+(b.t||'')).localeCompare(a.d+(a.t||'')));
  const tot = txs.reduce((s,t)=>s+t.a,0);
  document.getElementById('listSum').textContent = `${txs.length} giao dịch · tổng ${fmt(tot)}`;
  const show = txs.slice(0, (page+1)*PAGE);
  document.getElementById('list').innerHTML = show.map(t=>{
    const cls = t.l==='Chi tiêu'?'chi':(t.l==='Thu nhập'?'thu':'nb');
    const sign = t.l==='Chi tiêu'?'-':(t.l==='Thu nhập'?'+':'');
    return `<div class="txn"><div class="desc"><div class="m">${t.m.replace(/</g,'&lt;')}</div>
    <div class="sub"><span class="badge">${t.c}</span>${t.d.split('-').reverse().join('/')}${t.t?' '+t.t:''} · ${t.b}</div></div>
    <div class="amt ${cls}">${sign}${fmt(t.a)}</div></div>`;
  }).join('');
  document.getElementById('more').style.display = show.length < txs.length ? 'block' : 'none';
}
</script>
</body>
</html>
