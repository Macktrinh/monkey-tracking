<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<title>Monkey Finance</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --bg:#f7f7f8; --card:#ffffff; --card2:#f0f0f2; --line:#e6e6ea;
  --tx:#0d0d0d; --mut:#8e8ea0; --soft:#6e6e80;
  --green:#10a37f; --red:#e5484d; --chip:#ececf1; --amber:#b45309;
  --shadow:0 1px 2px rgba(0,0,0,.04), 0 4px 16px rgba(0,0,0,.03);
  --btn:#0d0d0d; --btntx:#ffffff;
}
[data-theme="dark"]{
  --bg:#0d0d10; --card:#17171c; --card2:#1f1f26; --line:#26262e;
  --tx:#ececf1; --mut:#8e8ea0; --soft:#a9a9b8;
  --green:#19c37d; --red:#ff6369; --chip:#26262e; --amber:#fbbf24;
  --shadow:0 1px 2px rgba(0,0,0,.3);
  --btn:#ececf1; --btntx:#0d0d10;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{background:var(--bg);color:var(--tx);font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;min-height:100vh;transition:background .25s,color .25s}
.num{font-variant-numeric:tabular-nums}
#lock{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:99;padding:20px}
.lockbox{width:100%;max-width:360px;background:var(--card);border:1px solid var(--line);border-radius:24px;padding:40px 32px;text-align:center;box-shadow:var(--shadow)}
.lockbox .logo{font-size:40px;margin-bottom:14px}
.lockbox h2{font-size:19px;font-weight:600;margin-bottom:6px}
.lockbox p{font-size:13px;color:var(--mut);margin-bottom:24px}
.lockbox input{width:100%;padding:13px 16px;border-radius:14px;border:1px solid var(--line);background:var(--bg);color:var(--tx);font-size:16px;text-align:center;margin-bottom:12px;font-family:inherit;outline:none}
.lockbox input:focus{border-color:var(--soft)}
.lockbox button{width:100%;padding:13px;border-radius:14px;border:none;background:var(--btn);color:var(--btntx);font-size:15px;font-weight:600;cursor:pointer;font-family:inherit}
#lockerr{color:var(--red);font-size:13px;margin-top:12px;min-height:16px}
#app{display:none;max-width:1024px;margin:0 auto;padding:20px 16px 90px}
header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:10px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:10px;font-size:17px;font-weight:700}
.brand .logo{font-size:24px}
.hright{display:flex;align-items:center;gap:8px}
.iconbtn{height:36px;min-width:36px;padding:0 10px;border-radius:12px;border:1px solid var(--line);background:var(--card);color:var(--tx);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;font-family:inherit;font-weight:600}
.iconbtn .b{font-size:12px;color:var(--amber)}
/* period bar */
.periodbar{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.seg{display:flex;background:var(--chip);border-radius:12px;padding:3px}
.seg button{border:none;background:transparent;color:var(--mut);padding:7px 13px;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s}
.seg button.on{background:var(--card);color:var(--tx);box-shadow:var(--shadow)}
.pnav{display:flex;align-items:center;gap:4px}
.pnav button{width:32px;height:32px;border-radius:10px;border:1px solid var(--line);background:var(--card);color:var(--tx);font-size:15px;cursor:pointer}
.pnav .plabel{font-size:14px;font-weight:600;min-width:120px;text-align:center}
.tabs{display:flex;gap:6px;margin-bottom:18px}
.tabs>button{border:none;background:transparent;color:var(--mut);padding:9px 16px;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
.tabs>button.on{background:var(--chip);color:var(--tx)}
.grid{display:grid;grid-template-columns:1fr;gap:14px}
@media(min-width:760px){.grid{grid-template-columns:1fr 1fr}.span2{grid-column:span 2}}
.card{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:20px;box-shadow:var(--shadow)}
.card h3{font-size:13px;font-weight:600;color:var(--mut);margin-bottom:14px}
.bignum{font-size:30px;font-weight:700;letter-spacing:-.02em;line-height:1.15}
.delta{display:inline-flex;align-items:center;gap:4px;font-size:13px;font-weight:600;border-radius:999px;padding:3px 10px;margin-top:8px}
.delta.up{color:var(--red);background:color-mix(in srgb,var(--red) 12%,transparent)}
.delta.down{color:var(--green);background:color-mix(in srgb,var(--green) 12%,transparent)}
.sub{font-size:12px;color:var(--mut);margin-top:6px}
.krow{display:flex;gap:24px;flex-wrap:wrap;margin-top:4px}
.kmini .l{font-size:12px;color:var(--mut);margin-bottom:3px}
.kmini .v{font-size:16px;font-weight:600}
.chartwrap{position:relative;width:100%;margin-top:10px}
.crow{display:flex;align-items:center;gap:12px;padding:9px 0}
.crow .ic{width:38px;height:38px;border-radius:12px;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.crow .mid{flex:1;min-width:0}
.crow .nm{font-size:14px;font-weight:500;display:flex;justify-content:space-between;gap:8px}
.crow .nm .a{font-weight:600;white-space:nowrap}
.crow .bar{height:5px;border-radius:99px;background:var(--card2);margin-top:7px;overflow:hidden}
.crow .bar i{display:block;height:100%;border-radius:99px;background:var(--tx);opacity:.75}
.crow .pc{font-size:12px;color:var(--mut);width:38px;text-align:right;flex-shrink:0}
.srow{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--line)}
.srow:last-child{border-bottom:none}
.srow .ic{width:34px;height:34px;border-radius:10px;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:15px}
.srow .mid{flex:1;min-width:0}
.srow .nm{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.srow .d{font-size:12px;color:var(--mut);margin-top:1px}
.srow .a{font-size:14px;font-weight:600;white-space:nowrap}
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.filters>*{flex:1;min-width:120px}
select,input.search,.field input,.field select,.field textarea{background:var(--card);color:var(--tx);border:1px solid var(--line);border-radius:12px;padding:10px 12px;font-size:14px;font-family:inherit;outline:none;appearance:none}
.lsum{font-size:13px;color:var(--mut);margin-bottom:12px;padding:0 4px}
.txn{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--line);cursor:pointer;border-radius:8px}
.txn:hover{background:color-mix(in srgb,var(--chip) 40%,transparent)}
.txn:last-child{border-bottom:none}
.txn .ic{width:38px;height:38px;border-radius:12px;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;position:relative}
.txn .ic .dot{position:absolute;top:-2px;right:-2px;width:10px;height:10px;border-radius:99px;background:var(--amber);border:2px solid var(--card)}
.txn .mid{flex:1;min-width:0}
.txn .m{font-size:14px;font-weight:500;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical}
.txn .d{font-size:12px;color:var(--mut);margin-top:2px}
.txn .a{font-size:14px;font-weight:600;white-space:nowrap;text-align:right}
.a.chi{color:var(--tx)}.a.thu{color:var(--green)}.a.nb{color:var(--mut);font-weight:500}
#more{width:100%;padding:12px;border-radius:14px;border:1px solid var(--line);background:var(--card);color:var(--tx);font-size:14px;font-weight:500;cursor:pointer;margin-top:14px;font-family:inherit}
.link{background:none;border:none;color:var(--mut);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;padding:0}
footer{text-align:center;color:var(--mut);font-size:12px;margin-top:28px}
/* FAB */
#fab{position:fixed;right:20px;bottom:24px;width:56px;height:56px;border-radius:18px;border:none;background:var(--btn);color:var(--btntx);font-size:26px;cursor:pointer;box-shadow:0 6px 24px rgba(0,0,0,.25);z-index:50;display:none}
/* modal */
#ovl{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:60;display:none;align-items:flex-end;justify-content:center}
@media(min-width:640px){#ovl{align-items:center}}
#modal{width:100%;max-width:480px;max-height:92vh;overflow:auto;background:var(--card);border:1px solid var(--line);border-radius:24px 24px 0 0;padding:24px 20px 28px}
@media(min-width:640px){#modal{border-radius:24px}}
#modal h2{font-size:17px;font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:8px}
#modal .mid-sub{font-size:12px;color:var(--mut);margin-bottom:18px;word-break:break-all}
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
.field label{font-size:12px;font-weight:600;color:var(--mut)}
.field textarea{resize:vertical;min-height:56px}
.frow{display:flex;gap:10px}
.frow .field{flex:1}
.mbtns{display:flex;gap:10px;margin-top:8px}
.mbtns button{flex:1;padding:12px;border-radius:14px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;border:1px solid var(--line);background:var(--card);color:var(--tx)}
.mbtns button.primary{background:var(--btn);color:var(--btntx);border:none}
.mbtns button.danger{color:var(--red)}
.editnote{font-size:12px;color:var(--amber);margin-top:10px;text-align:center}
</style>
</head>
<body>
<div id="lock"><div class="lockbox">
<div class="logo">🐒</div>
<h2>Monkey Finance</h2>
<p>Dữ liệu được mã hóa đầu cuối</p>
<input id="pw" type="password" placeholder="Nhập mật khẩu" autocomplete="current-password">
<button onclick="unlock()">Mở khóa</button>
<div id="lockerr"></div>
</div></div>

<div id="app">
<header>
<div class="brand"><span class="logo">🐒</span> Monkey Finance</div>
<div class="hright">
<button class="iconbtn" id="pendBtn" onclick="exportChanges()" title="Xuất thay đổi chưa đồng bộ" style="display:none">⇪ <span class="b" id="pendN"></span></button>
<button class="iconbtn" onclick="toggleTheme()" title="Đổi giao diện">◐</button>
</div>
</header>

<div class="periodbar">
<div class="seg" id="modeSeg">
<button data-m="day">Ngày</button>
<button data-m="month" class="on">Tháng</button>
<button data-m="year">Năm</button>
<button data-m="all">Tất cả</button>
</div>
<div class="pnav" id="pnav">
<button onclick="nav(-1)">‹</button>
<div class="plabel num" id="plabel"></div>
<button onclick="nav(1)">›</button>
</div>
</div>

<div class="tabs">
<button class="on" data-t="overview" onclick="showTab('overview')">Tổng quan</button>
<button data-t="txns" onclick="showTab('txns')">Giao dịch</button>
</div>

<div id="overview" class="grid">
  <div class="card">
    <h3 id="heroLbl"></h3>
    <div class="bignum num" id="heroVal"></div>
    <span class="delta" id="heroDelta"></span>
    <div class="chartwrap"><canvas id="cHero" height="150"></canvas></div>
    <div class="sub" id="heroSub"></div>
  </div>
  <div class="card">
    <h3 id="ovLbl">Thu / Chi</h3>
    <div class="krow">
      <div class="kmini"><div class="l">Thu nhập</div><div class="v num" style="color:var(--green)" id="kThu"></div></div>
      <div class="kmini"><div class="l">Chi tiêu</div><div class="v num" id="kChi"></div></div>
      <div class="kmini"><div class="l">Chênh lệch</div><div class="v num" id="kNet"></div></div>
    </div>
    <div class="chartwrap"><canvas id="cBar" height="170"></canvas></div>
  </div>
  <div class="card">
    <h3>Chi theo danh mục</h3>
    <div id="catList"></div>
  </div>
  <div class="card">
    <h3>Định kỳ / Subscriptions</h3>
    <div id="subList"></div>
  </div>
  <div class="card span2">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
      <h3 style="margin:0">Giao dịch trong kỳ</h3>
      <button class="link" onclick="showTab('txns')">Xem tất cả →</button>
    </div>
    <div id="recentList"></div>
  </div>
</div>

<div id="txns" style="display:none">
<div class="filters">
<input class="search" id="q" placeholder="Tìm kiếm..." oninput="renderList(true)">
<select id="fCat" onchange="renderList(true)"></select>
<select id="fType" onchange="renderList(true)">
<option value="">Loại: tất cả</option><option>Chi tiêu</option><option>Thu nhập</option><option>Nội bộ</option>
</select>
</div>
<div class="lsum num" id="listSum"></div>
<div class="card"><div id="list"></div><button id="more" onclick="page++;renderList()">Xem thêm</button></div>
</div>

<footer id="foot"></footer>
</div>

<button id="fab" onclick="openAdd()" title="Thêm giao dịch">＋</button>

<div id="ovl" onclick="if(event.target===this)closeModal()">
<div id="modal">
<h2 id="mTitle"></h2>
<div class="mid-sub" id="mSub"></div>
<div class="frow">
<div class="field"><label>Ngày</label><input type="date" id="eD"></div>
<div class="field"><label>Giờ</label><input type="time" id="eT"></div>
</div>
<div class="field"><label>Mô tả</label><textarea id="eM"></textarea></div>
<div class="frow">
<div class="field"><label>Số tiền (VND)</label><input type="number" id="eA" min="0" step="1000"></div>
<div class="field"><label>Loại</label><select id="eL"><option>Chi tiêu</option><option>Thu nhập</option><option>Nội bộ</option></select></div>
</div>
<div class="frow">
<div class="field"><label>Danh mục</label><select id="eC"></select></div>
<div class="field"><label>Ngân hàng</label><input type="text" id="eB" placeholder="VD: VPBank"></div>
</div>
<div class="mbtns">
<button onclick="closeModal()">Hủy</button>
<button id="mRevert" class="danger" onclick="revertTxn()" style="display:none">Hoàn tác</button>
<button class="primary" onclick="saveTxn()">Lưu</button>
</div>
<div class="editnote" id="mNote" style="display:none"></div>
</div>
</div>

/* ---------- theme ---------- */
function applyTheme(t){
  document.documentElement.dataset.theme = t==='auto' ? (matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light') : t;
  localStorage.setItem('mf-theme', t);
  if(DATA) renderAll();
}
function toggleTheme(){ applyTheme(document.documentElement.dataset.theme==='dark'?'light':'dark'); }
applyTheme(localStorage.getItem('mf-theme')||'auto');
matchMedia('(prefers-color-scheme: dark)').addEventListener('change',()=>{ if((localStorage.getItem('mf-theme')||'auto')==='auto') applyTheme('auto'); });

/* ---------- overlay (local edits/adds) ---------- */
const loadOv = () => JSON.parse(localStorage.getItem('mf-overlay')||'{"edits":{},"adds":[]}');
const saveOv = o => localStorage.setItem('mf-overlay', JSON.stringify(o));
function applyOverlay(){
  const ov = loadOv();
  const baseIds = new Set(BASE.tx.map(t=>t.i));
  // drop merged adds & stale edits
  ov.adds = ov.adds.filter(t=>!baseIds.has(t.i));
  for(const id in ov.edits){
    const b = BASE.tx.find(t=>t.i===id);
    if(!b){ delete ov.edits[id]; continue; }
    const e = ov.edits[id];
    if(['d','t','m','c','l','a','b'].every(k=>b[k]===e[k])) delete ov.edits[id];
  }
  saveOv(ov);
  DATA = {updated: BASE.updated, gm: BASE.gm, tx: BASE.tx.map(t=> ov.edits[t.i] ? {...t, ...ov.edits[t.i], _e:1} : t).concat(ov.adds.map(t=>({...t,_a:1})))};
  DATA.tx.forEach(t=>{ t.g = t.c==='Nội bộ' ? 'Nội bộ' : (DATA.gm[t.c]||'Khác'); });
  const n = Object.keys(ov.edits).length + ov.adds.length;
  document.getElementById('pendBtn').style.display = n?'flex':'none';
  document.getElementById('pendN').textContent = n;
}
function exportChanges(){
  const ov = loadOv();
  const out = {exported:new Date().toISOString(), device:navigator.userAgent.slice(0,40), edits:ov.edits, adds:ov.adds};
  const blob = new Blob([JSON.stringify(out,null,1)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'mf-changes-' + new Date().toISOString().slice(0,16).replace(/[-:T]/g,'') + '.json';
  a.click();
  alert('Đã tải file thay đổi. Bỏ file này vào folder Drive "Monkey Tracking App 2.0" để Claude merge vào sổ Excel lần cập nhật sau nhé!');
}

/* ---------- crypto ---------- */
async function unlock(){
  const pw = document.getElementById('pw').value;
  const err = document.getElementById('lockerr');
  err.textContent = 'Đang giải mã...';
  try{
    const enc = new TextEncoder();
    const km = await crypto.subtle.importKey('raw', enc.encode(pw), 'PBKDF2', false, ['deriveKey']);
    const key = await crypto.subtle.deriveKey({name:'PBKDF2', salt:b64(PAYLOAD.salt), iterations:PAYLOAD.iter, hash:'SHA-256'}, km, {name:'AES-GCM', length:256}, false, ['decrypt']);
    const pt = await crypto.subtle.decrypt({name:'AES-GCM', iv:b64(PAYLOAD.iv)}, key, b64(PAYLOAD.ct));
    BASE = JSON.parse(new TextDecoder().decode(pt));
    applyOverlay();
    document.getElementById('lock').style.display='none';
    document.getElementById('app').style.display='block';
    document.getElementById('fab').style.display='block';
    init();
  }catch(e){ err.textContent = 'Sai mật khẩu, thử lại nhé.'; }
}
document.getElementById('pw').addEventListener('keydown', e=>{ if(e.key==='Enter') unlock(); });

function showTab(t){
  document.querySelectorAll('.tabs>button').forEach(x=>x.classList.toggle('on', x.dataset.t===t));
  document.getElementById('overview').style.display = t==='overview'?'grid':'none';
  document.getElementById('txns').style.display = t==='txns'?'block':'none';
  window.scrollTo({top:0});
}

/* ---------- period ---------- */
function latestDate(){ return DATA.tx.map(t=>t.d).sort().pop(); }
function init(){
  cursor = latestDate();
  document.getElementById('modeSeg').querySelectorAll('button').forEach(b=>b.onclick=()=>{ mode=b.dataset.m; renderAll(); });
  const cats = [...new Set([...Object.keys(DATA.gm), ...DATA.tx.map(t=>t.c)])].sort();
  document.getElementById('fCat').innerHTML = '<option value="">Danh mục: tất cả</option>' + cats.map(c=>`<option>${c}</option>`).join('');
  document.getElementById('eC').innerHTML = cats.map(c=>`<option>${c}</option>`).join('');
  document.getElementById('foot').textContent = `Cập nhật ${DATA.updated} · ${DATA.tx.length.toLocaleString('vi-VN')} giao dịch · mã hóa AES-256`;
  renderAll();
}
function pKey(d){ return mode==='day'?d : mode==='month'?d.slice(0,7) : mode==='year'?d.slice(0,4) : ''; }
function curKey(){ return pKey(cursor); }
function nav(dir){
  const [y,m,dd] = cursor.split('-').map(Number);
  let dt = new Date(y, m-1, dd);
  if(mode==='day') dt.setDate(dt.getDate()+dir);
  else if(mode==='month') dt.setMonth(dt.getMonth()+dir, 15);
  else if(mode==='year') dt.setFullYear(dt.getFullYear()+dir);
  else return;
  cursor = dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0');
  renderAll();
}
function prevKey(){
  const [y,m,dd] = cursor.split('-').map(Number);
  let dt = new Date(y, m-1, dd);
  if(mode==='day'){ dt.setDate(dt.getDate()-1); return dt.toISOString().slice(0,10); }
  if(mode==='month'){ dt.setMonth(dt.getMonth()-1, 15); return dt.toISOString().slice(0,7); }
  if(mode==='year') return String(y-1);
  return '';
}
const sel = () => mode==='all' ? DATA.tx : DATA.tx.filter(t=>t.d.startsWith(curKey()));
function pLabel(){
  const [y,m,dd] = cursor.split('-');
  return mode==='day' ? `${dd}/${m}/${y}` : mode==='month' ? `Tháng ${+m}/${y}` : mode==='year' ? y : 'Toàn bộ';
}

function destroyCharts(){ Object.values(charts).forEach(c=>c&&c.destroy()); charts={}; }

/* ---------- render ---------- */
function renderAll(){
  if(!DATA) return;
  document.querySelectorAll('#modeSeg button').forEach(b=>b.classList.toggle('on', b.dataset.m===mode));
  document.getElementById('pnav').style.visibility = mode==='all'?'hidden':'visible';
  document.getElementById('plabel').textContent = pLabel();
  destroyCharts();
  const MUT=cssv('--mut'), LINE=cssv('--line'), TX=cssv('--tx'), GREEN=cssv('--green'), CHIP=cssv('--chip');
  Chart.defaults.font.family = "'Inter',sans-serif";
  const txs = sel().filter(t=>t.l!=='Nội bộ');
  const chiTx = t=>t.l==='Chi tiêu', thuTx = t=>t.l==='Thu nhập';
  const sum = a=>a.reduce((s,t)=>s+t.a,0);
  const thu = sum(txs.filter(thuTx)), chi = sum(txs.filter(chiTx));

  document.getElementById('ovLbl').textContent = 'Thu / Chi · ' + pLabel().toLowerCase();
  document.getElementById('kThu').textContent = fmt(thu);
  document.getElementById('kChi').textContent = fmt(chi);
  const net=thu-chi, kn=document.getElementById('kNet');
  kn.textContent=(net>=0?'+':'')+fmt(net); kn.style.color = net>=0?GREEN:cssv('--red');

  /* hero */
  const allChi = DATA.tx.filter(t=>chiTx(t)&&t.l!=='Nội bộ');
  document.getElementById('heroLbl').textContent = 'Chi tiêu · ' + pLabel().toLowerCase();
  document.getElementById('heroVal').textContent = fmt(chi);
  const dEl = document.getElementById('heroDelta'); dEl.style.display='none';
  const sEl = document.getElementById('heroSub'); sEl.textContent='';
  const hc = document.getElementById('cHero').getContext('2d');
  const grad = hc.createLinearGradient(0,0,0,150); grad.addColorStop(0,TX+'26'); grad.addColorStop(1,TX+'00');
  const lineOpts = {responsive:true, interaction:{mode:'index',intersect:false}, plugins:{legend:{display:false}, tooltip:{callbacks:{label:c=>c.dataset.label+': '+fmt(c.raw)}}}, scales:{x:{ticks:{color:MUT,maxTicksLimit:7,font:{size:11}},grid:{display:false}}, y:{ticks:{color:MUT,callback:v=>fmtS(v),maxTicksLimit:5,font:{size:11}},grid:{color:LINE},border:{display:false}}}};

  if(mode==='day'){
    // 14-day window bars, highlight cursor; delta vs yesterday
    const days=[]; const [y,m,dd]=cursor.split('-').map(Number);
    for(let i=13;i>=0;i--){ const dt=new Date(y,m-1,dd-i); days.push(dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0')); }
    const vals = days.map(d=>sum(allChi.filter(t=>t.d===d)));
    const yst = vals[12];
    if(yst>0){ const pct=Math.round((vals[13]-yst)/yst*100); dEl.className='delta '+(pct>=0?'up':'down'); dEl.textContent=`${pct>=0?'↑':'↓'} ${Math.abs(pct)}% so với hôm trước`; dEl.style.display='inline-flex'; }
    charts.hero = new Chart(hc, {type:'bar', data:{labels:days.map(d=>d.slice(8)+'/'+ +d.slice(5,7)), datasets:[{label:'Chi', data:vals, backgroundColor:days.map(d=>d===cursor?TX:CHIP), borderRadius:5, maxBarThickness:16}]}, options:{...lineOpts, plugins:{...lineOpts.plugins, tooltip:{callbacks:{label:c=>'Chi: '+fmt(c.raw)}}}}});
    sEl.textContent = '14 ngày gần nhất';
  } else if(mode==='month'){
    const mo=curKey(), pmo=prevKey();
    const dim = mm => new Date(mm.split('-')[0], mm.split('-')[1], 0).getDate();
    const daily = mm => { const a=Array(dim(mm)).fill(0); allChi.filter(t=>t.d.startsWith(mm)).forEach(t=>{a[+t.d.slice(8)-1]+=t.a}); let s=0; return a.map(v=>s+=v); };
    const cur=daily(mo), prv=daily(pmo);
    const today = latestDate();
    const lastDay = mo===today.slice(0,7) ? +today.slice(8) : dim(mo);
    const prevSame = prv[Math.min(lastDay,prv.length)-1]||0;
    if(prevSame>0){ const pct=Math.round((chi-prevSame)/prevSame*100); dEl.className='delta '+(pct>=0?'up':'down'); dEl.textContent=`${pct>=0?'↑':'↓'} ${Math.abs(pct)}% so với cùng kỳ tháng trước`; dEl.style.display='inline-flex'; }
    charts.hero = new Chart(hc, {type:'line', data:{labels:cur.map((_,i)=>i+1), datasets:[
      {label:pLabel(), data:cur.slice(0,lastDay), borderColor:TX, backgroundColor:grad, fill:true, borderWidth:2, pointRadius:0, tension:.35},
      {label:'Tháng trước', data:prv, borderColor:MUT, borderDash:[4,4], borderWidth:1.5, pointRadius:0, tension:.35, fill:false}]},
      options:{...lineOpts, plugins:{...lineOpts.plugins, tooltip:{...lineOpts.plugins.tooltip, callbacks:{title:i=>'Ngày '+i[0].label, label:c=>c.dataset.label+': '+fmt(c.raw)}}}}});
    sEl.textContent = `Tháng trước cả tháng: ${fmt(prv[prv.length-1]||0)} · đường liền = cộng dồn`;
  } else {
    // year & all: cumulative by month vs prev year
    const yr = mode==='year'?curKey():'';
    const mos = mode==='year' ? Array.from({length:12},(_,i)=>yr+'-'+String(i+1).padStart(2,'0')) : [...new Set(allChi.map(t=>t.d.slice(0,7)))].sort();
    const cum = keys => { let s=0; return keys.map(k=>s+=sum(allChi.filter(t=>t.d.startsWith(k)))); };
    const curC = cum(mos);
    let ds = [{label:mode==='year'?yr:'Tất cả', data:curC, borderColor:TX, backgroundColor:grad, fill:true, borderWidth:2, pointRadius:0, tension:.3}];
    if(mode==='year'){
      const pyr = prevKey();
      const pmos = Array.from({length:12},(_,i)=>pyr+'-'+String(i+1).padStart(2,'0'));
      const prvC = cum(pmos);
      if(prvC[11]>0) ds.push({label:pyr, data:prvC, borderColor:MUT, borderDash:[4,4], borderWidth:1.5, pointRadius:0, tension:.3, fill:false});
      const lastMoIdx = Math.max(0, mos.findIndex(m=>m===latestDate().slice(0,7)));
      const idx = yr===latestDate().slice(0,4) ? lastMoIdx : 11;
      const prevSame = prvC[idx]||0;
      if(prevSame>0){ const pct=Math.round((chi-prevSame)/prevSame*100); dEl.className='delta '+(pct>=0?'up':'down'); dEl.textContent=`${pct>=0?'↑':'↓'} ${Math.abs(pct)}% so với cùng kỳ ${pyr}`; dEl.style.display='inline-flex'; }
      ds[0].data = curC.slice(0, idx+1);
    }
    charts.hero = new Chart(hc, {type:'line', data:{labels:mos.map(m=>'T'+ +m.slice(5)), datasets:ds}, options:{...lineOpts, plugins:{...lineOpts.plugins, tooltip:{...lineOpts.plugins.tooltip, callbacks:{label:c=>c.dataset.label+': '+fmt(c.raw)}}}}});
    sEl.textContent = 'Chi tiêu cộng dồn' + (mode==='all'?' toàn bộ':'');
  }

  /* bar chart thu/chi */
  let bLabels, bThu, bChi;
  const inSel = DATA.tx.filter(t=>t.l!=='Nội bộ');
  if(mode==='day' || mode==='month'){
    const mo = cursor.slice(0,7);
    const dim = new Date(+mo.slice(0,4), +mo.slice(5), 0).getDate();
    bLabels = Array.from({length:dim},(_,i)=>i+1);
    const dsel = d => inSel.filter(t=>t.d===mo+'-'+String(d).padStart(2,'0'));
    bThu = bLabels.map(d=>sum(dsel(d).filter(thuTx)));
    bChi = bLabels.map(d=>sum(dsel(d).filter(chiTx)));
  } else {
    const keys = mode==='year' ? Array.from({length:12},(_,i)=>curKey()+'-'+String(i+1).padStart(2,'0')) : [...new Set(inSel.map(t=>t.d.slice(0,7)))].sort();
    bLabels = keys.map(m=>'T'+ +m.slice(5) + (mode==='all'?'/'+m.slice(2,4):''));
    bThu = keys.map(m=>sum(inSel.filter(t=>thuTx(t)&&t.d.startsWith(m))));
    bChi = keys.map(m=>sum(inSel.filter(t=>chiTx(t)&&t.d.startsWith(m))));
  }
  charts.bar = new Chart(document.getElementById('cBar'), {type:'bar',
    data:{labels:bLabels, datasets:[
      {label:'Thu', data:bThu, backgroundColor:GREEN, borderRadius:4, maxBarThickness:12},
      {label:'Chi', data:bChi, backgroundColor:CHIP, borderRadius:4, maxBarThickness:12}]},
    options:{responsive:true, plugins:{legend:{labels:{color:MUT,boxWidth:10,boxHeight:10,borderRadius:5,useBorderRadius:true,font:{size:12}}}, tooltip:{callbacks:{label:c=>c.dataset.label+': '+fmt(c.raw)}}},
      scales:{x:{ticks:{color:MUT,font:{size:10},maxTicksLimit:16},grid:{display:false}}, y:{ticks:{color:MUT,callback:v=>fmtS(v),maxTicksLimit:5,font:{size:11}},grid:{color:LINE},border:{display:false}}}}});

  /* categories */
  const cats={};
  txs.filter(chiTx).forEach(t=>{cats[t.c]=(cats[t.c]||0)+t.a});
  const ck = Object.keys(cats).sort((a,b)=>cats[b]-cats[a]);
  const mx = cats[ck[0]]||1;
  document.getElementById('catList').innerHTML = ck.length ? ck.slice(0,9).map(c=>`
    <div class="crow"><div class="ic">${ic(c)}</div>
    <div class="mid"><div class="nm"><span>${c}</span><span class="a num">${fmt(cats[c])}</span></div>
    <div class="bar"><i style="width:${Math.max(2,cats[c]/mx*100)}%"></i></div></div>
    <div class="pc num">${Math.round(cats[c]/chi*100)}%</div></div>`).join('') : '<div class="sub">Không có chi tiêu trong kỳ</div>';

  /* subscriptions */
  const subs={};
  sel().filter(t=>chiTx(t)&&t.c==='Tiện ích').forEach(t=>{
    let k = t.m.split(/[\s\-\(\[]/).slice(0,2).join(' ').replace(/[*_.,]/g,'').trim().toUpperCase() || t.m;
    (subs[k]=subs[k]||{n:0,tot:0,last:'',name:t.m}).n++; subs[k].tot+=t.a;
    if(t.d>subs[k].last){subs[k].last=t.d; subs[k].name=t.m;}
  });
  const sk = Object.keys(subs).sort((a,b)=>subs[b].tot-subs[a].tot).slice(0,7);
  document.getElementById('subList').innerHTML = sk.length ? sk.map(k=>{const s=subs[k];return `
    <div class="srow"><div class="ic">📱</div>
    <div class="mid"><div class="nm">${s.name.split('(')[0].slice(0,42)}</div>
    <div class="d">${s.n} lần · gần nhất ${dvn(s.last)}</div></div>
    <div class="a num">${fmt(Math.round(s.tot/s.n))}<span style="color:var(--mut);font-weight:400;font-size:12px">/lần</span></div></div>`}).join('')
    : '<div class="sub">Không có khoản định kỳ trong kỳ</div>';

  /* recent in period */
  const rec = [...sel()].filter(t=>t.l!=='Nội bộ').sort((a,b)=>(b.d+(b.t||'')).localeCompare(a.d+(a.t||''))).slice(0,6);
  document.getElementById('recentList').innerHTML = rec.map(txnRow).join('') || '<div class="sub">Không có giao dịch trong kỳ</div>';
  bindTxnClicks('recentList');
  renderList(true);
}

function txnRow(t){
  const cls = t.l==='Chi tiêu'?'chi':(t.l==='Thu nhập'?'thu':'nb');
  const sign = t.l==='Chi tiêu'?'−':(t.l==='Thu nhập'?'+':'');
  const mark = (t._e||t._a) ? '<span class="dot"></span>' : '';
  return `<div class="txn" data-id="${encodeURIComponent(t.i)}"><div class="ic">${ic(t.c)}${mark}</div>
  <div class="mid"><div class="m">${t.m.replace(/</g,'&lt;')}</div>
  <div class="d">${t.c} · ${dvn(t.d)}${t.t?' '+t.t:''} · ${t.b}${t._a?' · thêm tay':''}${t._e?' · đã sửa':''}</div></div>
  <div class="a num ${cls}">${sign}${fmt(t.a)}</div></div>`;
}
function bindTxnClicks(elId){
  document.getElementById(elId).querySelectorAll('.txn').forEach(el=>{
    el.onclick = ()=>openTxn(decodeURIComponent(el.dataset.id));
  });
}

function renderList(reset){
  if(reset) page=0;
  const q = document.getElementById('q').value.toLowerCase();
  const fc = document.getElementById('fCat').value;
  const ft = document.getElementById('fType').value;
  let txs = sel();
  txs = ft ? txs.filter(t=>t.l===ft) : txs.filter(t=>t.l!=='Nội bộ');
  if(fc) txs = txs.filter(t=>t.c===fc);
  if(q) txs = txs.filter(t=>(t.m+' '+t.c+' '+t.b).toLowerCase().includes(q));
  txs.sort((a,b)=>(b.d+(b.t||'')).localeCompare(a.d+(a.t||'')));
  document.getElementById('listSum').textContent = `${txs.length.toLocaleString('vi-VN')} giao dịch · tổng ${fmt(txs.reduce((s,t)=>s+t.a,0))} · ${pLabel().toLowerCase()}`;
  const show = txs.slice(0,(page+1)*PAGE);
  document.getElementById('list').innerHTML = show.map(txnRow).join('') || '<div class="sub" style="padding:10px 0">Không có giao dịch nào</div>';
  bindTxnClicks('list');
  document.getElementById('more').style.display = show.length<txs.length?'block':'none';
}

/* ---------- modal ---------- */
function openModal(){ document.getElementById('ovl').style.display='flex'; }
function closeModal(){ document.getElementById('ovl').style.display='none'; editingId=null; }
function openTxn(id){
  const t = DATA.tx.find(x=>x.i===id); if(!t) return;
  editingId = id;
  document.getElementById('mTitle').textContent = (t._a?'Giao dịch thêm tay':'Chi tiết giao dịch');
  document.getElementById('mSub').textContent = `Mã GD: ${t.i}${t.b?' · '+t.b:''}`;
  document.getElementById('eD').value = t.d;
  document.getElementById('eT').value = t.t||'';
  document.getElementById('eM').value = t.m;
  document.getElementById('eA').value = t.a;
  document.getElementById('eL').value = t.l;
  document.getElementById('eC').value = t.c;
  document.getElementById('eB').value = t.b||'';
  const rv = document.getElementById('mRevert');
  rv.style.display = (t._e||t._a)?'block':'none';
  rv.textContent = t._a ? 'Xóa' : 'Hoàn tác';
  const note = document.getElementById('mNote');
  note.style.display = (t._e||t._a)?'block':'none';
  note.textContent = t._a ? 'Giao dịch thêm tay trên thiết bị này — chưa vào sổ Excel' : 'Đã sửa trên thiết bị này — chưa đồng bộ vào sổ Excel';
  openModal();
}
function openAdd(){
  editingId = null;
  document.getElementById('mTitle').textContent = 'Thêm giao dịch';
  document.getElementById('mSub').textContent = 'Nhập tay — lưu trên thiết bị, đồng bộ vào sổ khi xuất file';
  document.getElementById('eD').value = latestDate();
  document.getElementById('eT').value = new Date().toTimeString().slice(0,5);
  document.getElementById('eM').value = '';
  document.getElementById('eA').value = '';
  document.getElementById('eL').value = 'Chi tiêu';
  document.getElementById('eC').value = 'Ăn uống';
  document.getElementById('eB').value = '';
  document.getElementById('mRevert').style.display='none';
  document.getElementById('mNote').style.display='none';
  openModal();
}
function saveTxn(){
  const v = {
    d: document.getElementById('eD').value,
    t: document.getElementById('eT').value,
    m: document.getElementById('eM').value.trim(),
    a: Math.round(+document.getElementById('eA').value||0),
    l: document.getElementById('eL').value,
    c: document.getElementById('eC').value,
    b: document.getElementById('eB').value.trim()
  };
  if(!v.d || !v.m || !v.a){ alert('Cần nhập đủ: ngày, mô tả, số tiền.'); return; }
  const ov = loadOv();
  if(editingId){
    const base = BASE.tx.find(x=>x.i===editingId);
    if(base){ ov.edits[editingId] = v; }
    else {
      const i = ov.adds.findIndex(x=>x.i===editingId);
      if(i>=0) ov.adds[i] = {...ov.adds[i], ...v};
    }
  } else {
    ov.adds.push({...v, i:'mf:'+Date.now(), g:''});
  }
  saveOv(ov); applyOverlay(); closeModal(); renderAll();
}
function revertTxn(){
  const ov = loadOv();
  if(ov.edits[editingId]) delete ov.edits[editingId];
  else ov.adds = ov.adds.filter(x=>x.i!==editingId);
  saveOv(ov); applyOverlay(); closeModal(); renderAll();
}
</script>
